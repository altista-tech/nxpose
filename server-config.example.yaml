# nxpose Server Configuration

# Server settings
server:
  # Address to bind the server to
  # Use 0.0.0.0 to bind to all interfaces
  bind_address: "0.0.0.0"

  # Port for the HTTPS API server
  # This is used for client registration, tunnel management, and WebSocket connections
  port: 8443

  # Base domain for tunnels
  # This domain should be configured in your DNS to point to this server
  # All subdomain tunnels will be created under this domain
  domain: "example.com"

# TLS settings
tls:
  # Path to TLS certificate file
  # If Let's Encrypt is enabled, this is used as a fallback certificate
  cert: "/etc/nxpose/certs/server.crt"

  # Path to TLS key file
  # If Let's Encrypt is enabled, this is used as a fallback key
  key: "/etc/nxpose/certs/server.key"

  # Minimum TLS version (optional)
  # min_version: "1.2"

  # Preferred cipher suites (optional)
  # cipher_suites:
  #   - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
  #   - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"

# OAuth2 configuration for user authentication
oauth2:
  # Enable OAuth2 authentication
  enabled: true

  # Redirect URL for OAuth callbacks
  # Should match your server domain
  redirect_url: "https://nxpose.naxrevlis.com/auth/callback"

  # Session key for cookie encryption (generate a random string)
  session_key: "change-this-to-a-random-secret-key"

  # Session store options
  # Available options: "memory", "mongo", "redis"
  # - "memory": In-memory session storage (not persistent, lost on server restart)
  # - "mongo": Store sessions in MongoDB (requires MongoDB to be enabled)
  # - "redis": Store sessions in Redis (requires Redis to be enabled)
  session_store: "memory"

  token_duration: "5m"    # JWT token duration
  cookie_duration: "24h"  # Cookie duration

  # OAuth providers - configure at least one provider
  providers:
    # # Google OAuth configuration
    # - name: "google"
    #   client_id: "your-google-client-id"
    #   client_secret: "your-google-client-secret"
    #   scopes:
    #     - "https://www.googleapis.com/auth/userinfo.email"
    #     - "https://www.googleapis.com/auth/userinfo.profile"

    # GitHub OAuth configuration
    - name: "github"
      client_id: "github-client-id"
      client_secret: "github-client-secret"
      scopes:
        - "user:email"
        - "read:user"

# MongoDB configuration for user storage
mongodb:
  # Enable MongoDB storage
  enabled: true

  # MongoDB connection URI
  uri: "mongodb://localhost:27017"

  # Database name
  database: "nxpose"

  # Connection timeout
  timeout: "10s"

# Redis configuration for session storage and caching
redis:
  # Enable Redis storage
  enabled: false

  # Redis server host
  host: "localhost"

  # Redis server port
  port: 6379

  # Redis password (optional)
  # password: ""

  # Redis database number
  db: 0

  # Key prefix for Redis keys
  key_prefix: "nxpose:"

  # Connection timeout
  timeout: "10s"

# Let's Encrypt settings for automatic TLS certificates
letsencrypt:
  # Enable Let's Encrypt integration
  enabled: false

  # Email address for Let's Encrypt registration
  # This is required if Let's Encrypt is enabled
  email: "admin@example.com"
  
  # Environment to use: "production" or "staging"
  # Use "staging" for testing to avoid rate limits
  environment: "production"

  # Directory to store Let's Encrypt certificates
  # If not specified, defaults to $HOME/.nxpose/certificates
  storage_dir: "/etc/nxpose/certificates"

# Tunnel settings
tunnels:
  # Maximum number of tunnels per user
  # Limits how many tunnels a single user can create across all their clients
  max_per_user: 10

  # Maximum connection time for tunnels
  # Format: duration string like "10s", "5m", "2h", "24h", etc.
  # Leave empty for no time limit
  max_connection: ""

  # Tunnel expiration time in hours (default: 24)
  expiration_hours: 24

  # Automatically clean up inactive tunnels after this many minutes
  inactive_timeout_mins: 60

  # TCP port range for TCP tunnels
  tcp_port_min: 10000
  tcp_port_max: 20000

# Logging settings
logging:
  # Log level (debug, info, warn, error)
  level: "info"

  # Log format (text, json)
  format: "text"

  # Log file (if not specified, logs to stdout)
  # file: "/var/log/nxpose/server.log"

# Enable verbose output for debugging
verbose: false

# Admin panel settings
admin:
  # Enable the admin panel web interface
  enabled: false

  # URL path prefix for admin panel (default: /admin)
  path_prefix: "/admin"

  # Authentication method: "basic" or "none"
  auth_method: "basic"

  # Admin panel credentials (required when auth_method is "basic")
  username: "admin"
  password: "change-me"

# Access control settings
access_control:
  # Enable authentication for clients (recommended for production)
  require_auth: true

  # Allow registration of new clients
  allow_registration: true

  # Allowed client sources (IP ranges in CIDR notation)
  # If empty, all sources are allowed
  allowed_sources:
    - "0.0.0.0/0"  # Allow all IPs (default)
    # - "192.168.1.0/24"  # Example: Allow only local network