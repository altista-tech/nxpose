site_name: NXpose
site_url: https://nxpose.mpanin.me/docs/
site_author: Maksim Panin
site_description: >-
  NXpose is a self-hosted tunneling service written in Go that exposes local
  services to the internet through encrypted tunnels.

repo_name: altista-tech/nxpose
repo_url: https://github.com/altista-tech/nxpose
copyright: "&copy; 2026 Maksim Panin &mdash; me@mpanin.me"

theme:
  name: material
  custom_dir: overrides
  favicon: favicon.svg
  language: en
  palette:
    - scheme: slate
      media: "(prefers-color-scheme: dark)"
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      media: "(prefers-color-scheme: light)"
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - toc.follow
    - toc.integrate
    - content.code.copy
    - content.tabs.link
    - search.suggest
    - search.highlight
  logo: icon.png

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - minify:
      minify_html: true

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/altista-tech/nxpose
      name: NXpose on GitHub

markdown_extensions:
  - smarty
  - sane_lists
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - NXpose: index.md
  - Server: server.md
