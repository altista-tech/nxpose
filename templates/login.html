<!DOCTYPE html>
<html>
<head>
    <title>{{.Title}}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
            line-height: 1.6;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }
        .message {
            margin-bottom: 30px;
            text-align: center;
        }
        .provider-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }
        .provider-button {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            border-radius: 6px;
            background-color: #f5f5f5;
            text-decoration: none;
            color: #333;
            font-weight: 500;
            border: 1px solid #ddd;
            transition: all 0.2s ease;
        }
        .provider-button:hover {
            background-color: #e9e9e9;
            border-color: #ccc;
        }
        .provider-button.github {
            background-color: #24292e;
            color: white;
            border-color: #1b1f23;
        }
        .provider-button.github:hover {
            background-color: #1b1f23;
        }
        .provider-button.google {
            background-color: #4285F4;
            color: white;
            border-color: #3367d6;
        }
        .provider-button.google:hover {
            background-color: #3367d6;
        }
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.9em;
            color: #7f8c8d;
        }
        .no-providers {
            text-align: center;
            padding: 20px;
            background-color: #f8d7da;
            color: #721c24;
            border-radius: 6px;
            margin-bottom: 30px;
        }
        @media (max-width: 600px) {
            body {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <h1>{{.Title}}</h1>
    
    <div class="message">{{.Message}}</div>
    
    <div class="provider-container">
    {{if .Providers}}
        {{range .Providers}}
        <a href="{{.URL}}" class="provider-button {{.Name}}">
            Sign in with {{.Name | title}}
        </a>
        {{end}}
    {{else}}
        <div class="no-providers">
            <p>No authentication providers are configured. Please contact the administrator.</p>
        </div>
    {{end}}
    </div>
    
    <div class="footer">
        <p>After authentication, a secure certificate will be generated for your client.</p>
    </div>
</body>
</html>
