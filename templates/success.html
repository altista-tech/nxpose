<!DOCTYPE html>
<html>
<head>
    <title>Registration Successful</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
            line-height: 1.6;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .success-icon {
            color: #2ecc71;
            font-size: 48px;
            margin: 20px 0;
        }
        .message {
            margin-bottom: 30px;
        }
        .next-steps {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 30px;
            text-align: left;
        }
        .command {
            font-family: monospace;
            background-color: #f1f1f1;
            padding: 8px 12px;
            border-radius: 4px;
            display: inline-block;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <h1>Registration Successful!</h1>
    
    <div class="success-icon">✓</div>
    
    <div class="message">
        <p>You have successfully registered your client with nxpose.</p>
        <p>Your certificate has been saved and you can close this window.</p>
    </div>
    
    <div class="next-steps">
        <p><strong>Next steps:</strong></p>
        <p>Return to your terminal and run the following command to start tunneling:</p>
        <div class="command">nxpose connect your-subdomain</div>
    </div>
</body>
</html>
