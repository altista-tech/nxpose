name: Build and Package nxpose

on:
  push:
    branches: [ main, feature/202503-01-redis-session ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        format: [deb, rpm]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          # Fix: In Ubuntu 24.04, rpm-build is part of the rpm package
          sudo apt-get install -y build-essential rpm alien
          # Install cross-compilation dependencies for RPM
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu
          fi

      - name: Create systemd service file
        run: |
          cat > nxpose.service << 'EOF'
          [Unit]
          Description=nxpose tunneling server
          After=network.target
          StartLimitIntervalSec=0

          [Service]
          Type=simple
          Restart=always
          RestartSec=1
          User=nxpose
          Group=nxpose
          ExecStart=/opt/nxpose/nxpose-server --config /etc/nxpose/server-config.yaml
          WorkingDirectory=/opt/nxpose
          Environment="PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          Environment="GODEBUG=netdns=go"

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Create default config
        run: |
          mkdir -p etc/nxpose
          cp server-config.example.yaml etc/nxpose/server-config.yaml
          
      - name: Fix Makefile if needed
        run: |
          # Fix any potential trailing whitespace in Makefile's .PHONY line
          perl -i -pe 's/\.PHONY:.+help\s+$/.PHONY: all all-arch build prepare-package package install uninstall clean clean-all test fmt help/' Makefile

      - name: Build and package for ${{ matrix.arch }} (${{ matrix.format }})
        run: |
          # Set version from git tag or use a default
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            # For non-tag builds, use different version formats for RPM and DEB
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            if [ "${{ matrix.format }}" = "rpm" ]; then
              # RPM doesn't allow hyphens in version, use different format
              VERSION="1.0.0"
              RELEASE="0.dev.${TIMESTAMP}"
            else
              VERSION="1.0.0-dev.${TIMESTAMP}"
              RELEASE="1"
            fi
          fi
          
          # For RPM, we need to handle version and release separately
          if [ "${{ matrix.format }}" = "rpm" ]; then
            # Set version and release in Makefile
            sed -i "s/VERSION := 1.0.0/VERSION := ${VERSION}/" Makefile
            # Add RPM_RELEASE variable to the build
            if [ -n "${RELEASE}" ]; then
              echo "RPM_RELEASE := ${RELEASE}" >> Makefile
            fi
          else
            # For DEB and other formats, just set the version
            sed -i "s/VERSION := 1.0.0/VERSION := ${VERSION}/" Makefile
          fi

          # Set up RPM build environment
          if [ "${{ matrix.format }}" = "rpm" ]; then
            mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
            echo "%_topdir %(echo $HOME)/rpmbuild" > ~/.rpmmacros
            if [ "${{ matrix.arch }}" = "arm64" ]; then
              echo "%_target_cpu aarch64" >> ~/.rpmmacros
              echo "%_target_os linux" >> ~/.rpmmacros
            fi
          fi

          # Build package
          make ARCH=${{ matrix.arch }} PACKAGE_FORMAT=${{ matrix.format }}
          
          # List created packages
          ls -la nxpose*.${{ matrix.format }}

      - name: Install MinIO client
        if: github.event_name != 'pull_request'
        run: |
          curl -LO https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x mc
          ./mc --version

      - name: Configure MinIO client
        if: github.event_name != 'pull_request'
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          ./mc alias set minio $MINIO_ENDPOINT $MINIO_ACCESS_KEY $MINIO_SECRET_KEY

      - name: Upload package to MinIO
        if: github.event_name != 'pull_request'
        run: |
          # Set version from git tag or use a default for S3 path
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            S3_VERSION=${GITHUB_REF#refs/tags/v}
          else
            S3_VERSION="latest"
          fi
          
          # Create bucket if it doesn't exist
          ./mc mb --ignore-existing minio/nxpose-packages
          
          # Upload the package
          for pkg in nxpose*.${{ matrix.format }}; do
            if [ -f "$pkg" ]; then
              # Upload to version-specific path
              ./mc cp "$pkg" "minio/nxpose-packages/$S3_VERSION/$pkg"
              # If this is a tag release, also copy to 'latest' path
              if [[ "$GITHUB_REF" == refs/tags/* ]]; then
                ./mc cp "$pkg" "minio/nxpose-packages/latest/$pkg"
              fi
              echo "Uploaded $pkg to MinIO S3"
            fi
          done 