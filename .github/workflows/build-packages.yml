name: Build and Package nxpose

on:
  push:
    branches: [ main, feature/202503-01-redis-session ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        format: [deb]
    
    outputs:
      version: ${{ steps.set-version.outputs.version }}
      s3_version: ${{ steps.set-version.outputs.s3_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Create systemd service file
        run: |
          cat > nxpose.service << 'EOF'
          [Unit]
          Description=nxpose tunneling server
          After=network.target
          StartLimitIntervalSec=0

          [Service]
          Type=simple
          Restart=always
          RestartSec=1
          User=nxpose
          Group=nxpose
          ExecStart=/opt/nxpose/nxpose-server --config /etc/nxpose/server-config.yaml
          WorkingDirectory=/opt/nxpose
          Environment="PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          Environment="GODEBUG=netdns=go"

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Create default config
        run: |
          mkdir -p etc/nxpose
          cp server-config.example.yaml etc/nxpose/server-config.yaml
          
      - name: Fix Makefile if needed
        run: |
          # Fix any potential trailing whitespace in Makefile's .PHONY line
          perl -i -pe 's/\.PHONY:.+help\s+$/.PHONY: all all-arch build prepare-package package install uninstall clean clean-all test fmt help/' Makefile

      - id: set-version
        name: Set version info
        run: |
          # Set version from git tag or use a default
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
            S3_VERSION=${GITHUB_REF#refs/tags/v}
          else
            # For non-tag builds, use timestamp-based version
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            VERSION="1.0.0-dev.${TIMESTAMP}"
            S3_VERSION="latest"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "s3_version=$S3_VERSION" >> $GITHUB_OUTPUT

      - name: Build and package for ${{ matrix.arch }}
        run: |
          # Set version in Makefile
          sed -i "s/VERSION := 1.0.0/VERSION := ${{ steps.set-version.outputs.version }}/" Makefile

          # Build package
          make ARCH=${{ matrix.arch }} PACKAGE_FORMAT=deb
          
          # List created packages
          ls -la nxpose*.deb

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nxpose-${{ matrix.arch }}-deb
          path: nxpose*.deb
          retention-days: 1

  upload-to-digitalocean:
    name: Upload to DigitalOcean Spaces
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List packages
        run: find dist -type f | sort

      - name: Install AWS CLI
        run: |
          # Check if AWS CLI is already installed
          if aws --version &> /dev/null; then
            echo "AWS CLI is already installed:"
            aws --version
          else
            # Install AWS CLI if not available
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip awscliv2.zip
            sudo ./aws/install
          fi

      - name: Configure AWS CLI for DigitalOcean Spaces
        env:
          DO_SPACES_KEY: ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACES_ENDPOINT: ${{ secrets.DO_SPACES_ENDPOINT }}
        run: |
          aws configure set aws_access_key_id $DO_SPACES_KEY
          aws configure set aws_secret_access_key $DO_SPACES_SECRET
          aws configure set default.region us-east-1
          # The us-east-1 region is used by default with DigitalOcean Spaces

      - name: Upload packages to DigitalOcean Spaces
        env:
          DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}
          DO_SPACES_ENDPOINT: ${{ secrets.DO_SPACES_ENDPOINT }}
          S3_VERSION: ${{ needs.build.outputs.s3_version }}
        run: |
          # Upload all package files from artifacts
          find dist -type f -name "*.deb" | while read -r pkg; do
            filename=$(basename "$pkg")
            
            # Upload to version-specific path
            aws s3 cp "$pkg" "s3://${DO_SPACES_BUCKET}/nxpose-packages/${S3_VERSION}/$filename" --endpoint=https://${DO_SPACES_ENDPOINT}
            
            # If this is a tag release, also copy to 'latest' path
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              aws s3 cp "$pkg" "s3://${DO_SPACES_BUCKET}/nxpose-packages/latest/$filename" --endpoint=https://${DO_SPACES_ENDPOINT}
            fi
            
            echo "Uploaded $filename to DigitalOcean Spaces"
          done 