name: Build and Package nxpose

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        format: [deb, rpm]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential rpm alien

      - name: Create systemd service file
        run: |
          cat > nxpose.service << 'EOF'
          [Unit]
          Description=nxpose tunneling server
          After=network.target
          StartLimitIntervalSec=0

          [Service]
          Type=simple
          Restart=always
          RestartSec=1
          User=nxpose
          Group=nxpose
          ExecStart=/opt/nxpose/nxpose-server --config /etc/nxpose/server-config.yaml
          WorkingDirectory=/opt/nxpose
          Environment="PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          Environment="GODEBUG=netdns=go"

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Create default config
        run: |
          mkdir -p etc/nxpose
          cp server-config.example.yaml etc/nxpose/server-config.yaml

      - name: Build and package for ${{ matrix.arch }} (${{ matrix.format }})
        run: |
          # Set version from git tag or use a default
          VERSION=${GITHUB_REF#refs/tags/v}
          if [[ "$VERSION" == "$GITHUB_REF" ]]; then
            VERSION="1.0.0-dev.$(date +%Y%m%d%H%M%S)"
          fi
          
          # Add version to the build
          sed -i "s/VERSION := 1.0.0/VERSION := $VERSION/g" Makefile

          # Build package
          make ARCH=${{ matrix.arch }} PACKAGE_FORMAT=${{ matrix.format }}
          
          # List created packages
          ls -la nxpose*.${{ matrix.format }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nxpose-${{ matrix.arch }}-${{ matrix.format }}
          path: nxpose*.${{ matrix.format }}
          retention-days: 7

  upload-to-minio:
    name: Upload to MinIO S3
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' # Only upload on push to main or tags

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List packages
        run: find dist -type f | sort

      - name: Install MinIO client
        run: |
          curl -LO https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x mc
          ./mc --version

      - name: Configure MinIO client
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          ./mc alias set minio $MINIO_ENDPOINT $MINIO_ACCESS_KEY $MINIO_SECRET_KEY

      - name: Upload packages to MinIO
        run: |
          # Set version from git tag or use a default
          VERSION=${GITHUB_REF#refs/tags/v}
          if [[ "$VERSION" == "$GITHUB_REF" ]]; then
            VERSION="latest"
          fi
          
          # Create bucket if it doesn't exist
          ./mc mb --ignore-existing minio/nxpose-packages
          
          # Upload packages
          find dist -type f -name "*.deb" -o -name "*.rpm" | while read -r pkg; do
            filename=$(basename "$pkg")
            # Upload to version-specific path
            ./mc cp "$pkg" "minio/nxpose-packages/$VERSION/$filename"
            # If this is a tag release, also copy to 'latest' path
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              ./mc cp "$pkg" "minio/nxpose-packages/latest/$filename"
            fi
            echo "Uploaded $filename to MinIO S3"
          done 