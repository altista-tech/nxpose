name: Build and Package nxpose

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Gate on test workflow passing: require tests to succeed before building
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Run tests first - all build jobs depend on this
  tests:
    name: Run Tests
    uses: ./.github/workflows/test.yml

  build-deb:
    name: Build DEB (${{ matrix.arch }})
    needs: tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Create systemd service file
        run: |
          cat > nxpose.service << 'SERVICEEOF'
          [Unit]
          Description=nxpose tunneling server
          After=network.target
          StartLimitIntervalSec=0

          [Service]
          Type=simple
          Restart=always
          RestartSec=1
          User=nxpose
          Group=nxpose
          ExecStart=/opt/nxpose/nxpose-server --config /etc/nxpose/server-config.yaml
          WorkingDirectory=/opt/nxpose
          Environment="PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          Environment="GODEBUG=netdns=go"

          [Install]
          WantedBy=multi-user.target
          SERVICEEOF

      - name: Set version
        id: set-version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            VERSION="1.0.0-dev.${TIMESTAMP}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build DEB package
        run: |
          sed -i "s/VERSION := 1.0.0/VERSION := ${{ steps.set-version.outputs.version }}/" Makefile
          make ARCH=${{ matrix.arch }} PACKAGE_FORMAT=deb
          ls -la nxpose*.deb

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: nxpose-${{ matrix.arch }}-deb
          path: nxpose*.deb
          retention-days: 7

  build-rpm:
    name: Build RPM (${{ matrix.arch }})
    needs: tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Install RPM build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential rpm

      - name: Create systemd service file
        run: |
          cat > nxpose.service << 'SERVICEEOF'
          [Unit]
          Description=nxpose tunneling server
          After=network.target
          StartLimitIntervalSec=0

          [Service]
          Type=simple
          Restart=always
          RestartSec=1
          User=nxpose
          Group=nxpose
          ExecStart=/opt/nxpose/nxpose-server --config /etc/nxpose/server-config.yaml
          WorkingDirectory=/opt/nxpose
          Environment="PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          Environment="GODEBUG=netdns=go"

          [Install]
          WantedBy=multi-user.target
          SERVICEEOF

      - name: Set version
        id: set-version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            VERSION="1.0.0-dev.${TIMESTAMP}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build RPM package
        run: |
          sed -i "s/VERSION := 1.0.0/VERSION := ${{ steps.set-version.outputs.version }}/" Makefile
          make ARCH=${{ matrix.arch }} PACKAGE_FORMAT=rpm
          ls -la nxpose*.rpm

      - name: Verify RPM contains systemd service
        run: |
          rpm -qlp nxpose*.rpm | grep -q "systemd/system/nxpose.service" && echo "RPM contains systemd service file" || (echo "ERROR: RPM missing systemd service file" && exit 1)
          rpm -qlp nxpose*.rpm | grep -q "opt/nxpose/nxpose-server" && echo "RPM contains server binary" || (echo "ERROR: RPM missing server binary" && exit 1)
          rpm -qlp nxpose*.rpm | grep -q "etc/nxpose/server-config.yaml" && echo "RPM contains config file" || (echo "ERROR: RPM missing config file" && exit 1)
          echo "RPM package verification passed - installs server as a systemd service"

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: nxpose-${{ matrix.arch }}-rpm
          path: nxpose*.rpm
          retention-days: 7

  build-macos-pkg:
    name: Build macOS PKG (${{ matrix.arch }})
    needs: tests
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Set version
        id: set-version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            VERSION="1.0.0-dev.${TIMESTAMP}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build macOS PKG
        run: |
          sed -i '' "s/VERSION := 1.0.0/VERSION := ${{ steps.set-version.outputs.version }}/" Makefile
          make ARCH=${{ matrix.arch }}
          ls -la nxpose*.pkg

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: nxpose-${{ matrix.arch }}-pkg
          path: nxpose*.pkg
          retention-days: 7

  build-client-binaries:
    name: Build Client Binaries
    needs: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Build all client binaries
        run: make build-clients

      - name: Upload client binaries
        uses: actions/upload-artifact@v4
        with:
          name: nxpose-client-binaries
          path: dist/nxpose-*
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: [build-deb, build-rpm, build-macos-pkg, build-client-binaries]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Organize release assets
        run: |
          mkdir -p release-assets
          find release-artifacts -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.pkg" -o -name "nxpose-*" \) -exec cp {} release-assets/ \;
          echo "Release assets:"
          ls -la release-assets/

      - name: Generate checksums
        run: |
          cd release-assets
          sha256sum * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-to-digitalocean:
    name: Upload to DigitalOcean Spaces
    needs: [build-deb, build-rpm, build-macos-pkg, build-client-binaries]
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List packages
        run: find dist -type f | sort

      - name: Install AWS CLI
        run: |
          if aws --version &> /dev/null; then
            echo "AWS CLI is already installed:"
            aws --version
          else
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip awscliv2.zip
            sudo ./aws/install
          fi

      - name: Configure AWS CLI for DigitalOcean Spaces
        env:
          DO_SPACES_KEY: ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACES_ENDPOINT: ${{ secrets.DO_SPACES_ENDPOINT }}
        run: |
          aws configure set aws_access_key_id $DO_SPACES_KEY
          aws configure set aws_secret_access_key $DO_SPACES_SECRET
          aws configure set default.region us-east-1

      - name: Upload packages to DigitalOcean Spaces
        env:
          DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}
          DO_SPACES_ENDPOINT: ${{ secrets.DO_SPACES_ENDPOINT }}
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            S3_VERSION=${GITHUB_REF#refs/tags/v}
          else
            S3_VERSION="latest"
          fi

          find dist -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.pkg" -o -name "nxpose-*" \) | while read -r pkg; do
            filename=$(basename "$pkg")
            aws s3 cp "$pkg" "s3://${DO_SPACES_BUCKET}/nxpose-packages/${S3_VERSION}/$filename" --endpoint=https://${DO_SPACES_ENDPOINT}
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              aws s3 cp "$pkg" "s3://${DO_SPACES_BUCKET}/nxpose-packages/latest/$filename" --endpoint=https://${DO_SPACES_ENDPOINT}
            fi
            echo "Uploaded $filename to DigitalOcean Spaces"
          done
