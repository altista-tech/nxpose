name: Build and Package nxpose

on:
  push:
    branches: [ main, feature/202503-01-redis-session ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        format: [deb]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Create systemd service file
        run: |
          cat > nxpose.service << 'EOF'
          [Unit]
          Description=nxpose tunneling server
          After=network.target
          StartLimitIntervalSec=0

          [Service]
          Type=simple
          Restart=always
          RestartSec=1
          User=nxpose
          Group=nxpose
          ExecStart=/opt/nxpose/nxpose-server --config /etc/nxpose/server-config.yaml
          WorkingDirectory=/opt/nxpose
          Environment="PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          Environment="GODEBUG=netdns=go"

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Create default config
        run: |
          mkdir -p etc/nxpose
          cp server-config.example.yaml etc/nxpose/server-config.yaml
          
      - name: Fix Makefile if needed
        run: |
          # Fix any potential trailing whitespace in Makefile's .PHONY line
          perl -i -pe 's/\.PHONY:.+help\s+$/.PHONY: all all-arch build prepare-package package install uninstall clean clean-all test fmt help/' Makefile

      - name: Build and package for ${{ matrix.arch }}
        run: |
          # Set version from git tag or use a default
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            # For non-tag builds, use timestamp-based version
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            VERSION="1.0.0-dev.${TIMESTAMP}"
          fi
          
          # Set version in Makefile
          sed -i "s/VERSION := 1.0.0/VERSION := ${VERSION}/" Makefile

          # Build package
          make ARCH=${{ matrix.arch }} PACKAGE_FORMAT=deb
          
          # List created packages
          ls -la nxpose*.deb

      - name: Install AWS CLI
        if: github.event_name != 'pull_request'
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install

      - name: Configure AWS CLI for DigitalOcean Spaces
        if: github.event_name != 'pull_request'
        env:
          DO_SPACES_KEY: ${{ secrets.DO_SPACES_KEY }}
          DO_SPACES_SECRET: ${{ secrets.DO_SPACES_SECRET }}
          DO_SPACES_ENDPOINT: ${{ secrets.DO_SPACES_ENDPOINT }}
        run: |
          aws configure set aws_access_key_id $DO_SPACES_KEY
          aws configure set aws_secret_access_key $DO_SPACES_SECRET
          aws configure set default.region us-east-1
          # The us-east-1 region is used by default with DigitalOcean Spaces

      - name: Upload package to DigitalOcean Spaces
        if: github.event_name != 'pull_request'
        env:
          DO_SPACES_BUCKET: ${{ secrets.DO_SPACES_BUCKET }}
          DO_SPACES_ENDPOINT: ${{ secrets.DO_SPACES_ENDPOINT }}
        run: |
          # Set version from git tag or use a default for S3 path
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            S3_VERSION=${GITHUB_REF#refs/tags/v}
          else
            S3_VERSION="latest"
          fi
          
          # Upload the package using AWS CLI with DigitalOcean Spaces endpoint
          for pkg in nxpose*.deb; do
            if [ -f "$pkg" ]; then
              # Upload to version-specific path
              aws s3 cp "$pkg" "s3://${DO_SPACES_BUCKET}/nxpose-packages/$S3_VERSION/$pkg" --endpoint=https://${DO_SPACES_ENDPOINT}
              # If this is a tag release, also copy to 'latest' path
              if [[ "$GITHUB_REF" == refs/tags/* ]]; then
                aws s3 cp "$pkg" "s3://${DO_SPACES_BUCKET}/nxpose-packages/latest/$pkg" --endpoint=https://${DO_SPACES_ENDPOINT}
              fi
              echo "Uploaded $pkg to DigitalOcean Spaces"
            fi
          done 