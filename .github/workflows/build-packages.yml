name: Build and Package nxpose

on:
  push:
    branches: [ main, feature/202503-01-redis-session ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build packages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
        format: [deb]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Create systemd service file
        run: |
          cat > nxpose.service << 'EOF'
          [Unit]
          Description=nxpose tunneling server
          After=network.target
          StartLimitIntervalSec=0

          [Service]
          Type=simple
          Restart=always
          RestartSec=1
          User=nxpose
          Group=nxpose
          ExecStart=/opt/nxpose/nxpose-server --config /etc/nxpose/server-config.yaml
          WorkingDirectory=/opt/nxpose
          Environment="PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
          Environment="GODEBUG=netdns=go"

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Create default config
        run: |
          mkdir -p etc/nxpose
          cp server-config.example.yaml etc/nxpose/server-config.yaml
          
      - name: Fix Makefile if needed
        run: |
          # Fix any potential trailing whitespace in Makefile's .PHONY line
          perl -i -pe 's/\.PHONY:.+help\s+$/.PHONY: all all-arch build prepare-package package install uninstall clean clean-all test fmt help/' Makefile

      - name: Build and package for ${{ matrix.arch }}
        run: |
          # Set version from git tag or use a default
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            # For non-tag builds, use timestamp-based version
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            VERSION="1.0.0-dev.${TIMESTAMP}"
          fi
          
          # Set version in Makefile
          sed -i "s/VERSION := 1.0.0/VERSION := ${VERSION}/" Makefile

          # Build package
          make ARCH=${{ matrix.arch }} PACKAGE_FORMAT=deb
          
          # List created packages
          ls -la nxpose*.deb

      - name: Install MinIO client
        if: github.event_name != 'pull_request'
        run: |
          curl -LO https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x mc
          ./mc --version

      - name: Configure MinIO client
        if: github.event_name != 'pull_request'
        env:
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
        run: |
          ./mc alias set minio $MINIO_ENDPOINT $MINIO_ACCESS_KEY $MINIO_SECRET_KEY

      - name: Upload package to MinIO
        if: github.event_name != 'pull_request'
        run: |
          # Set version from git tag or use a default for S3 path
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            S3_VERSION=${GITHUB_REF#refs/tags/v}
          else
            S3_VERSION="latest"
          fi
          
          # Create bucket if it doesn't exist
          ./mc mb --ignore-existing minio/nxpose-packages
          
          # Upload the package
          for pkg in nxpose*.deb; do
            if [ -f "$pkg" ]; then
              # Upload to version-specific path
              ./mc cp "$pkg" "minio/nxpose-packages/$S3_VERSION/$pkg"
              # If this is a tag release, also copy to 'latest' path
              if [[ "$GITHUB_REF" == refs/tags/* ]]; then
                ./mc cp "$pkg" "minio/nxpose-packages/latest/$pkg"
              fi
              echo "Uploaded $pkg to MinIO S3"
            fi
          done 